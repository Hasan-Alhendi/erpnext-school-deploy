name: erpnext

services:
  backend:
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: true
    image: ${ERPNEXT_IMAGE:-horizon/erpnext-school:v16.17.0-4}
    platform: linux/amd64
    pull_policy: missing
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  configurator:
    command:
      - |
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        bench set-config -g chromium_path /usr/bin/chromium-headless-shell;
        bench set-config -g dns_multitenant true;
    depends_on:
      db:
        condition: service_healthy
        required: true
      redis-cache:
        condition: service_started
        required: true
      redis-queue:
        condition: service_started
        required: true
    entrypoint:
      - bash
      - -c
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    image: ${ERPNEXT_IMAGE:-horizon/erpnext-school:v16.17.0-4}
    platform: linux/amd64
    pull_policy: missing
    restart: on-failure
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  db:
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      timeout: 5s
      interval: 5s
      retries: 5
      start_period: 5s
    image: mariadb:11.8
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/mysql

  frontend:
    command:
      - nginx-entrypoint.sh
    depends_on:
      backend:
        condition: service_started
        required: true
      websocket:
        condition: service_started
        required: true
    environment:
      BACKEND: backend:8000
      CLIENT_MAX_BODY_SIZE: 50m
      FRAPPE_SITE_NAME_HEADER: $$host
      PROXY_READ_TIMEOUT: "120"
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
    image: ${ERPNEXT_IMAGE:-horizon/erpnext-school:v16.17.0-4}
    platform: linux/amd64
    ports:
      - 127.0.0.1:8080:8080
    pull_policy: missing
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-long:
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: true
    image: ${ERPNEXT_IMAGE:-horizon/erpnext-school:v16.17.0-4}
    platform: linux/amd64
    pull_policy: missing
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-short:
    command:
      - bench
      - worker
      - --queue
      - short,default
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: true
    image: ${ERPNEXT_IMAGE:-horizon/erpnext-school:v16.17.0-4}
    platform: linux/amd64
    pull_policy: missing
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  redis-cache:
    image: redis:8.6-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:8.6-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  scheduler:
    command:
      - bench
      - schedule
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: true
    image: ${ERPNEXT_IMAGE:-horizon/erpnext-school:v16.17.0-4}
    platform: linux/amd64
    pull_policy: missing
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  websocket:
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: true
    image: ${ERPNEXT_IMAGE:-horizon/erpnext-school:v16.17.0-4}
    platform: linux/amd64
    pull_policy: missing
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites

networks:
  default:
    name: frappe_docker_default

volumes:
  db-data:
    name: frappe_docker_db-data

  redis-queue-data:
    name: frappe_docker_redis-queue-data

  sites:
    name: frappe_docker_sites
